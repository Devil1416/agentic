<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Full-Stack ToDo App</title>
        <link rel="stylesheet" href="/static/style.css">
        <script src="/static/script.js" defer></script>
    </head>
    <body>
        <h1>To Do List</h1>
        <form id="todo-form" onsubmit="return addTodo(event)">
            <input type="text" id="new-todo-item" placeholder="New task..." required>
            <button type="submit">Add Task</button>
        </form>
        <ul id="todo-list"></ul>
    </body>
</html>
