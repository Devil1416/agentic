<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Niggativity — Local-first autonomous coding agent. ChatGPT-style interface.">
    <title>niggativity</title>
    <link rel="stylesheet" href="/ui/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
</head>
<body>
<div id="app">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="header-btn" id="toggle-sidebar" title="Toggle sidebar">☰</button>
            <span class="header-logo">niggativity</span>
            <span class="header-tag">local</span>
        </div>
        <div class="header-right">
            <button class="header-btn toggle-btn" id="btn-think" title="Thinking Mode: OFF">🧠 Think</button>
            <button class="header-btn toggle-btn" id="btn-auto" title="Auto-Execute: OFF">🚀 Auto</button>
            <div class="status-dot" id="status-dot" title="Backend connected"></div>
            <button class="header-btn" id="btn-models" title="Models">⚙️</button>
            <button class="header-btn" id="btn-reset" title="New chat">✦</button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <!-- Sessions -->
        <div class="sidebar-section">
            <div class="sidebar-title">sessions</div>
        </div>
        <div class="session-list" id="session-list"></div>
        <button class="new-session-btn" id="btn-new-session">＋ New Chat</button>

        <!-- Divider -->
        <div class="sidebar-section">
            <div class="sidebar-title">workspace files</div>
        </div>
        <div class="file-tree" id="file-tree">
            <div class="file-item" style="color: var(--text-muted); font-style: italic;">
                No workspace active
            </div>
        </div>

        <!-- Errors / Logs Panel -->
        <div class="sidebar-section" style="margin-top: 15px;">
            <div class="sidebar-title">errors / logs</div>
        </div>
        <div class="file-tree" id="error-log-panel" style="max-height: 200px; color: var(--accent-red); font-size: 11px; white-space: pre-wrap; word-break: break-all; overflow-x: hidden;">
            <div style="color: var(--text-muted); font-style: italic;">No errors detected</div>
        </div>

        <div class="sidebar-actions">
            <button class="sidebar-btn" id="btn-refresh-files">🔄 Refresh Files</button>
            <button class="sidebar-btn" id="btn-run-task">▶ Run Task</button>
            <button class="sidebar-btn" id="btn-session-info">📊 Session Info</button>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="main">
        <div class="chat-container" id="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="welcome" id="welcome-screen">
                    <div class="welcome-logo">niggativity</div>
                    <div class="welcome-sub">
                        Local-first autonomous coding agent.<br>
                        Tell me what to build, debug, or explore.
                    </div>
                    <div class="welcome-prompts">
                        <button class="welcome-prompt" data-prompt="Build a REST API with FastAPI and SQLite">
                            ⚡ Build a REST API with FastAPI and SQLite
                        </button>
                        <button class="welcome-prompt" data-prompt="Create a React dashboard with charts">
                            📊 Create a React dashboard with charts
                        </button>
                        <button class="welcome-prompt" data-prompt="Help me debug my current project">
                            🐛 Help me debug my current project
                        </button>
                        <button class="welcome-prompt" data-prompt="What's in my workspace right now?">
                            📁 What's in my workspace?
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="chat-input" rows="1" placeholder="Message niggativity..." autocomplete="off"></textarea>
                    <button class="send-btn" id="send-btn" title="Send">↑</button>
                </div>
                <div class="input-hint">Enter to send · Shift+Enter for new line</div>
            </div>
        </div>
    </main>

</div>

<!-- Code Viewer Panel -->
<div class="code-viewer" id="code-viewer">
    <div class="code-viewer-header">
        <span class="code-viewer-title" id="code-viewer-title">file.py</span>
        <button class="code-viewer-close" id="code-viewer-close">✕</button>
    </div>
    <div class="code-viewer-content">
        <pre id="code-viewer-pre"></pre>
    </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<script src="/ui/app.js"></script>

</body>
</html>
